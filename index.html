<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>task board</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/app.js"></script>
  </head>
  <body>
    <section class="js-task-board">
      <form class="js-task-form-wrapper" autocomplete="off">
        <input
          type="text"
          data-text-input
          name="todo-text"
          placeholder="Enter task..."
          required
        />
        <button type="submit" data-add-todo-btn>Add task</button>
      </form>
      <ol class="todo-list-styles" data-todo-container></ol>
    </section>
  </body>
</html>
